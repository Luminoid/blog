# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Luminoid's Site
subtitle: OK Computer
description: A personal blog
author: Luminoid
language: en
timezone:

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: http://luminoid.github.io/blog
root: /blog/
permalink: :category/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: docs # Github will generate gh-pages with docs/ folder
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: tranquilpeak

# Deployment
## Docs: https://hexo.io/docs/deployment.html
# deploy:
#   type: git
#   repo: git@github.com:Luminoid/blog.git
#   branch: gh-pages
#   message:

# Include & Exclude
exclude:
  - .DS_Store

# RSS feed
feed:
  type: atom
  path: atom.xml # Default: atom.xml/rss2.xml
  limit: 20 # Use 0 or false to show all posts

# Define global keywords for search engines
keywords:
  - hexo

# Search
algolia:
  appId: "14QPLHN7KB"
  apiKey: "8944ed7d5c334aa391b7c56e64618d20"
  chunkSize: 5000
  indexName: "hexo-blog"
  fields:
    - title
    - date
    - permalink
    - thumbnailImageUrl
    - tags
    - categories
    - excerpt
    - excerpt:strip

# Highlighting
highlight:
  enable: false         # disable the default code highlight plugin
  # line_number: true
  # auto_detect: false
  # tab_replace:

prism_plugin:
  mode: 'preprocess'    # realtime/preprocess
  theme: 'coy'
  line_number: false     # default false

# hexo-all-minifier
## Docs: https://github.com/chenzhutian/hexo-all-minifier
all_minifier: true

js_concator:
  enable: false
  bundle_path: '/js/bundle.js'
  front: false
  silent: false

html_minifier:
  enable: true
  ignore_error: false
  silent: true
  exclude:

css_minifier:
  enable: true
  silent: true
  exclude:
    - '*.min.css'

js_minifier:
  enable: true
  mangle: true
  silent: true
  output:
  compress:
  exclude:
    - '*.min.js'

image_minifier:
  enable: true
  interlaced: false
  multipass: false
  optimizationLevel: 2
  pngquant: true
  progressive: false
  silent: true
